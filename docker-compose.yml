services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 30s
      retries: 12
  product-service:
    build:
      context: ./services/product-service
    container_name: product-service
    ports:
      - '3001:3001'
    volumes:
      - ./services/product-service:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/db
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  inventory-service:
    build:
      context: ./services/inventory-service
    container_name: inventory-service
    ports:
      - '3003:3003'
    volumes:
      - ./services/inventory-service:/app
      - /app/node_modules
    depends_on:
      rabbitmq:
        condition: service_healthy

  cart-service:
    build:
      context: ./services/cart-service
    container_name: cart-service
    ports:
      - '3002:3002'
    volumes:
      - ./services/cart-service:/app
      - /app/node_modules
    depends_on:
      rabbitmq:
        condition: service_healthy
      inventory-service:
        condition: service_started
      product-service:
        condition: service_started

  order-service:
    build:
      context: ./services/order-service
    container_name: order-service
    ports:
      - '3004:3004'
    volumes:
      - ./services/order-service:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/retail_orders
    depends_on:
      rabbitmq:
        condition: service_healthy
      cart-service:
        condition: service_started
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 30s
      retries: 5
volumes:
  postgres-data:
